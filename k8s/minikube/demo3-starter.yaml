apiVersion: v1
kind: Namespace
metadata:
  name: demo3
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo3-config
  namespace: demo3
data:
  APP_CLIENTS_PATIENT_SERVICE_BASE_URL: http://host.minikube.internal:8081
  APP_CLIENTS_APPOINTMENT_SERVICE_BASE_URL: http://host.minikube.internal:8082
  APP_CLIENTS_HEALTH_RECORD_SERVICE_BASE_URL: http://host.minikube.internal:8083
  APP_CLIENTS_AUTH_SERVICE_BASE_URL: http://host.minikube.internal:8085
  APP_ROUTES_AUTH_SERVICE_URI: http://host.minikube.internal:8085
  APP_ROUTES_WEB_BFF_URI: http://web-bff.demo3.svc.cluster.local:8091
  REDIS_HOST: host.minikube.internal
  REDIS_PORT: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: demo3-secrets
  namespace: demo3
type: Opaque
stringData:
  APP_SECURITY_JWT_SECRET: change-this-jwt-secret-at-least-32-chars-long
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-bff
  namespace: demo3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-bff
  template:
    metadata:
      labels:
        app: web-bff
    spec:
      containers:
        - name: web-bff
          image: scalecomm/web-bff:demo3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8091
          env:
            - name: APP_SECURITY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: demo3-secrets
                  key: APP_SECURITY_JWT_SECRET
            - name: APP_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: APP_CLIENTS_PATIENT_SERVICE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: demo3-config
                  key: APP_CLIENTS_PATIENT_SERVICE_BASE_URL
            - name: APP_CLIENTS_APPOINTMENT_SERVICE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: demo3-config
                  key: APP_CLIENTS_APPOINTMENT_SERVICE_BASE_URL
            - name: APP_CLIENTS_HEALTH_RECORD_SERVICE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: demo3-config
                  key: APP_CLIENTS_HEALTH_RECORD_SERVICE_BASE_URL
            - name: APP_CLIENTS_AUTH_SERVICE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: demo3-config
                  key: APP_CLIENTS_AUTH_SERVICE_BASE_URL
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8091
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web-bff
  namespace: demo3
spec:
  selector:
    app: web-bff
  ports:
    - name: http
      port: 8091
      targetPort: 8091
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: demo3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: scalecomm/api-gateway:demo3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_SECURITY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: demo3-secrets
                  key: APP_SECURITY_JWT_SECRET
            - name: APP_ROUTES_AUTH_SERVICE_URI
              valueFrom:
                configMapKeyRef:
                  name: demo3-config
                  key: APP_ROUTES_AUTH_SERVICE_URI
            - name: APP_ROUTES_WEB_BFF_URI
              valueFrom:
                configMapKeyRef:
                  name: demo3-config
                  key: APP_ROUTES_WEB_BFF_URI
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: demo3-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: demo3-config
                  key: REDIS_PORT
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: demo3
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
