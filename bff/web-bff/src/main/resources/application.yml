spring:
  application:
    name: web-bff

server:
  port: 8091

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:change-this-jwt-secret-at-least-32-chars-long}
  clients:
    patient-service-base-url: http://localhost:8081
    appointment-service-base-url: http://localhost:8082
    health-record-service-base-url: http://localhost:8083
    auth-service-base-url: http://localhost:8085