spring:
  application:
    name: mobile-bff

server:
  port: 8092

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  clients:
    patient-service-base-url: http://localhost:8081
    appointment-service-base-url: http://localhost:8082
    pharmacy-service-base-url: http://localhost:8086
    notification-service-base-url: http://localhost:8088
    auth-service-base-url: http://localhost:8085