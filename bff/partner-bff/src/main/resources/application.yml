spring:
  application:
    name: partner-bff

server:
  port: 8094

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:change-this-jwt-secret-at-least-32-chars-long}
  clients:
    insurance-service-base-url: http://localhost:8087
    appointment-service-base-url: http://localhost:8082
    billing-service-base-url: http://localhost:8084
    auth-service-base-url: http://localhost:8085