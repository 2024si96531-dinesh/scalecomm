spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:auth_db}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Compas@123}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    jwt:
      issuer: auth-service
      secret: ${APP_SECURITY_JWT_SECRET:change-this-jwt-secret-at-least-32-chars-long}
      expires-minutes: 60
    role-mapping:
      admin-usernames: ${APP_SECURITY_ADMIN_USERNAMES:admin,admin1}
      partner-usernames: ${APP_SECURITY_PARTNER_USERNAMES:partner,partner1}